apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-mesh
---
# ──────────────────────── REDIS ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sentinel-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinel-mesh
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# ──────────────────────── API GATEWAY ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sentinel-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/smesh/api-gateway:latest
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sentinel-mesh
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
# ──────────────────────── DASHBOARD (FRONTEND) ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: sentinel-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/smesh/dashboard:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: sentinel-mesh
  labels:
    app: dashboard
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# ──────────────────────── GO THREAT ENGINE ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-engine
  namespace: sentinel-mesh
spec:
  replicas: 3 # Scale this up! Go is extremely fast.
  selector:
    matchLabels:
      app: threat-engine
  template:
    metadata:
      labels:
        app: threat-engine
    spec:
      containers:
        - name: threat-engine
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/smesh/threat-engine:latest
          envFrom:
            - configMapRef:
                name: sentinel-config

---
# ──────────────────────── ML ANOMALY DETECTOR ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: sentinel-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
    spec:
      containers:
        - name: anomaly-detector
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/smesh/anomaly-detector:latest
          envFrom:
            - configMapRef:
                name: sentinel-config

---
# ──────────────────────── LOG GENERATOR ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: sentinel-mesh
spec:
  replicas: 1 # Only need 1 generator to simulate traffic
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
        - name: log-generator
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/smesh/log-generator:latest
          envFrom:
            - configMapRef:
                name: sentinel-config
