version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  log-generator:
    image: ghcr.io/${GITHUB_REPOSITORY}/log-generator:latest
    container_name: sentinel-log-generator
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_INTERVAL=0.5
    depends_on:
      - redis
    restart: always

  anomaly-detector:
    image: ghcr.io/${GITHUB_REPOSITORY}/anomaly-detector:latest
    container_name: sentinel-anomaly-detector
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - model_data:/app/models
    depends_on:
      - redis
    restart: always

  threat-engine:
    image: ghcr.io/${GITHUB_REPOSITORY}/threat-engine:latest
    container_name: sentinel-threat-engine
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  api-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/api-gateway:latest
    container_name: sentinel-api-gateway
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - threat-engine
    restart: always

  dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY}/dashboard:latest
    container_name: sentinel-dashboard
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: always

volumes:
  redis_data:
  model_data:
